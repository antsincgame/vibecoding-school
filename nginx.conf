server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Prerender for bots
    location / {
        set $prerender 0;

        if ($http_user_agent ~* "googlebot|bingbot|yandex|baiduspider|twitterbot|facebookexternalhit|rogerbot|linkedinbot|embedly|quora link preview|showyoubot|outbrain|pinterest|slackbot|vkShare|W3C_Validator|whatsapp|Applebot|TelegramBot|PerplexityBot|ChatGPT-User") {
            set $prerender 1;
        }

        if ($uri ~* "\.(js|css|xml|less|png|jpg|jpeg|gif|pdf|txt|ico|rss|zip|mp3|rar|exe|wmv|avi|ppt|mpg|mpeg|tif|wav|mov|psd|ai|xls|mp4|m4v|swf|dat|dmg|iso|flv|ttf|woff|woff2|svg|eot|webp|avif)") {
            set $prerender 0;
        }

        if ($prerender = 1) {
            rewrite ^(.+[^/])$ /https://$http_host$1/ break;
            rewrite ^(.+/)$ /https://$http_host$1 break;
            proxy_pass http://prerender:3000;
        }

        try_files $uri $uri/ /index.html;
    }
}
